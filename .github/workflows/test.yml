name: CI/CD - Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Define variáveis de ambiente globais para o Maven não poluir os logs
env:
  MAVEN_OPTS: "-Xmx1024m -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: caip_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name:  Set up JDK 17
        uses: actions/setup-java@v4 # Atualizado para v4 (Node 20)
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name:  Run Unit Tests
        run: mvn $MAVEN_CLI_OPTS clean test

      - name:  Run Integration Tests
        run: mvn $MAVEN_CLI_OPTS verify -Dskip.unit.tests=true

      - name:  Generate JaCoCo Report
        run: mvn $MAVEN_CLI_OPTS jacoco:report

      - name:  Upload Coverage to Codecov
        uses: codecov/codecov-action@v4 # Atualizado para v4
        with:
          file: ./target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: true # Falha se o Codecov estiver fora do ar

      - name:  Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # Garante que os resultados sejam publicados mesmo se testes falharem
        with:
          files: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml

  security-check:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    # Opcional: só roda o scan se os testes passarem, economizando minutos de CI
    needs: test

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4

      - name:  Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name:  OWASP Dependency Check
        # Removido 'continue-on-error: true'. Segurança se falha, bloqueia o build.
        run: mvn $MAVEN_CLI_OPTS dependency-check:aggregate -DfailBuildOnCVSS=7.0

      - name:  Upload OWASP Report
        if: failure() # Só faz upload se encontrar falhas para não encher o storage à toa
        uses: actions/upload-artifact@v4 # Atualizado para v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7