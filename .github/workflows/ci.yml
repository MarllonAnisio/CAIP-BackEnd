name: CAIP CI/CD Pipeline

on:
  push:
    branches: [ "main", "hmg" ]
  pull_request:
    branches: [ "main", "hmg" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissão de execução para o mvnw
        run: chmod +x mvnw

      - name: Executar Testes com Maven
        run: ./mvnw test

      - name: Build do Projeto (Pulando os testes que já rodaram)
        run: ./mvnw clean package -DskipTests