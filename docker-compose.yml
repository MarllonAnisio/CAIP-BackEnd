services:

  postgres:
    image: postgres:16-alpine
    container_name: caip-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DATA_POSTGRES_USERNAME:-*****}
      POSTGRES_PASSWORD: ${DATA_POSTGRES_PASSWORD:-*****}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATA_POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: caip-app
    ports:
      - "8080:8080"
    environment:
      PROFILE_ACTIVE: ${PROFILE_ACTIVE:-dev}
      DATA_POSTGRES_URL: jdbc:postgresql://postgres:5432/*****
      DATA_POSTGRES_USERNAME: ${DATA_POSTGRES_USERNAME:-*****}
      DATA_POSTGRES_PASSWORD: ${DATA_POSTGRES_PASSWORD:-*****}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-*****}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-*****}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-*****}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: