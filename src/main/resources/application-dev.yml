server:
  port: 8080

spring:
  datasource:

    url: ${DATA_POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATA_POSTGRES_USERNAME:postgres}
    password: ${DATA_POSTGRES_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cloudinary:
  api:
    cloud_name: ${CLOUDINARY_CLOUD_NAME:demo}
    key: ${CLOUDINARY_API_KEY:default_key}
    secret: ${CLOUDINARY_API_SECRET:default_secret}

security:
  jwt:
    secret-base64: ${JWT_SECRET:YOUR_BASE64_SECRET_HERE}