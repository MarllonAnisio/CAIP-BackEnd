# Configuração do Banco de Dados em Memória (H2) para Testes
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuração do JPA para o dialeto H2 e para criar/destruir o schema a cada teste
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Desativa o Liquibase para os testes, já que o schema está sendo gerenciado pelo Hibernate
spring.liquibase.enabled=false

# Desativa completamente o cache para o perfil de teste
spring.cache.type=none

# Desativa explicitamente a inicialização do Redisson
redisson.enabled=false
