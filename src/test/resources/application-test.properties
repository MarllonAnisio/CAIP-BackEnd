# ==========================================
# CONFIGURAÇÃO GERAL DO SPRING PARA TESTES
# ==========================================
# Permite que um bean de teste (@Primary) sobrescreva um bean de produção
spring.main.allow-bean-definition-overriding=true

# ==========================================
# BANCO DE DADOS EM MEMÓRIA (H2)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA & HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ==========================================
# POPULANDO O BANCO COM DADOS DE TESTE
# ==========================================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-integration.sql


# ==========================================
# DESLIGANDO INFRAESTRUTURA PESADA
# ==========================================
# Desativa o Liquibase (o Hibernate já está criando as tabelas no H2)
spring.liquibase.enabled=false

# Desativa o Spring Cache
spring.cache.type=none

# Desativa o Rate Limiting do Bucket4j
bucket4j.enabled=false

# ==========================================
# FAKES PARA EXTERNAL SERVICES (Cloudinary)
# ==========================================
cloudinary.api.cloud_name=fake_cloud
cloudinary.api.key=fake_key
cloudinary.api.secret=fake_secret

# ==========================================
# FAKES PARA SECURITY (JWT)
# ==========================================
# Chave Base64 falsa de no mínimo 256-bits para a classe JwtTokenService não quebrar
security.jwt.secret-base64=Q2FpcEJhY2tFbmRTZWNyZXRLZXlGb3JUZXN0aW5nUHVycG9zZXMxMjM0NTY3ODk=

# ==========================================
# EXPULSANDO A AUTO-CONFIGURAÇÃO DO REDIS
# ==========================================
spring.autoconfigure.exclude=org.redisson.spring.starter.RedissonAutoConfigurationV2,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration