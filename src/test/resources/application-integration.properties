# ==========================================
# PROFILE DE INTEGRAÇÃO (application-integration.properties)
# Objetivo: Testar com BD e Cache reais (Via Testcontainers)
# ==========================================
spring.main.allow-bean-definition-overriding=true

# ==========================================
# CONEXÃO COM O POSTGRESQL REAL (Via Testcontainers/DynamicPropertySource)
# ==========================================
# As propriedades de host, port, username e password serão injetadas
# dinamicamente pelo Testcontainers durante a execução dos testes.
spring.datasource.driverClassName=org.postgresql.Driver

# ==========================================
# JPA & HIBERNATE (Dialeto oficial do Postgres)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Cria as tabelas do zero para o teste e depois destrói
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==========================================
# POPULANDO O BANCO
# ==========================================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-integration.sql

# ==========================================
# LIGANDO O CACHE E O REDIS DE VERDADE
# ==========================================
# Avisa ao Spring que usaremos o JCache (motor do seu Redisson)
spring.cache.type=jcache
# A porta e host serão injetados dinamicamente pelo Testcontainers.
# A senha explícita vazia previne que variáveis de ambiente locais afetem o teste.
spring.data.redis.password=
# Ligando o Rate Limiting do Bucket4j
bucket4j.enabled=true

# ==========================================
# MANTENDO FAKES APENAS PARA SERVIÇOS DE REDE EXTERNOS
# Nunca chame APIs de terceiros na CI para evitar "Flaky Tests"
# ==========================================
cloudinary.api.cloud_name=fake_cloud
cloudinary.api.key=fake_key
cloudinary.api.secret=fake_secret

security.jwt.secret-base64=Q2FpcEJhY2tFbmRTZWNyZXRLZXlGb3JUZXN0aW5nUHVycG9zZXMxMjM0NTY3ODk=
